<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>{% block title %}VEX Score{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{% block bodyclass %}{% endblock %}">
{% block content %}{% endblock %}
<script>
function fmtTime(sec) {
  sec = Math.max(0, Math.ceil(sec));
  return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
}
async function fetchState() {
  const r = await fetch('/api/state', { cache: 'no-store' });
  if (!r.ok) throw new Error('state fetch failed');
  return r.json();
}
// Which part of the match we're in, plus the time left in that part.
function phaseInfo(s) {
  const auto = s.auto_duration, drv = s.driver_duration, total = s.timer_duration;
  const rem = s.timer_remaining, elapsed = total - rem;
  if (rem <= 0) return { label: 'MATCH OVER', cls: 'done', phaseRem: 0 };
  if (!s.timer_running && rem >= total) return { label: 'PRE-MATCH', cls: 'pre', phaseRem: total };
  if (elapsed < auto) return { label: 'AUTO ×2', cls: 'auto', phaseRem: auto - elapsed };
  if (elapsed < auto + drv) return { label: 'TELEOP', cls: 'driver', phaseRem: auto + drv - elapsed };
  return { label: 'ENDGAME — PARK!', cls: 'endgame', phaseRem: rem };
}
</script>
{% block script %}{% endblock %}
</body>
</html>
