{% extends "base.html" %}
{% block title %}Match Display{% endblock %}
{% block bodyclass %}display{% endblock %}
{% block content %}
  <header class="disp-top">
    <div class="match-label">MATCH <span id="match-number">&ndash;</span></div>
    <div id="timer" class="timer">--:--</div>
  </header>
  <main class="alliances">
    <section class="alliance red" id="red-side">
      <div class="alliance-name">RED</div>
      <div class="team-name" id="red-team">---</div>
      <div class="score" id="red-score">0</div>
      <div class="penalties">PENALTIES <span id="red-pen">0</span></div>
    </section>
    <div class="vs">VS</div>
    <section class="alliance blue" id="blue-side">
      <div class="alliance-name">BLUE</div>
      <div class="team-name" id="blue-team">---</div>
      <div class="score" id="blue-score">0</div>
      <div class="penalties">PENALTIES <span id="blue-pen">0</span></div>
    </section>
  </main>
{% endblock %}
{% block script %}
<script>
const last = { red: null, blue: null };

function setScore(team, val) {
  const el = document.getElementById(team + '-score');
  if (last[team] !== null && val !== last[team]) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }
  last[team] = val;
  el.textContent = val;
}

async function refresh() {
  try {
    const s = await fetchState();
    document.getElementById('match-number').textContent = s.match_number;
    document.getElementById('red-team').textContent = s.red_team;
    document.getElementById('blue-team').textContent = s.blue_team;
    setScore('red', s.red_score);
    setScore('blue', s.blue_score);
    document.getElementById('red-pen').textContent = s.red_penalties;
    document.getElementById('blue-pen').textContent = s.blue_penalties;

    document.getElementById('red-side').classList.toggle('leading', s.red_score > s.blue_score);
    document.getElementById('blue-side').classList.toggle('leading', s.blue_score > s.red_score);

    const timer = document.getElementById('timer');
    timer.textContent = fmtTime(s.timer_remaining);
    timer.className = 'timer';
    if (s.timer_remaining <= 0) {
      timer.classList.add('done');
    } else if (s.timer_remaining <= 10) {
      timer.classList.add('low');
      if (s.timer_running) timer.classList.add('pulse');
    } else if (s.timer_remaining <= 30) {
      timer.classList.add('warn');
    }
  } catch (e) { /* keep last known values if the network hiccups */ }
}
refresh();
setInterval(refresh, 1000);
</script>
{% endblock %}
