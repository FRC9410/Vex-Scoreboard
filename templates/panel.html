{% extends "base.html" %}
{% block title %}{{ team|capitalize }} Score{% endblock %}
{% block bodyclass %}panel {{ team }}{% endblock %}
{% block content %}
  <header class="panel-top">
    <a class="back" href="/">&#8592; Back</a>
    <div class="panel-title">{{ team|upper }} TEAM <span id="team-name"></span></div>
  </header>
  <main class="adjust">
    <div id="score" class="panel-score">&ndash;</div>
    <div class="btn-grid">
      <button class="adj-btn plus" data-delta="1">+1</button>
      <button class="adj-btn plus" data-delta="2">+2</button>
      <button class="adj-btn minus" data-delta="-1">&minus;1</button>
      <button id="clear" class="adj-btn clear">CLEAR</button>
    </div>
  </main>
{% endblock %}
{% block script %}
<script>
const TEAM = "{{ team }}";
let tapsInFlight = 0;
let lastScore = null;

function apply(s) {
  const el = document.getElementById('score');
  const val = s[TEAM + '_score'];
  if (lastScore !== null && val !== lastScore) {
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
  }
  lastScore = val;
  el.textContent = val;
  document.getElementById('team-name').textContent = s[TEAM + '_team'];
}

async function send(body) {
  tapsInFlight++;
  try {
    const r = await fetch('/api/adjust', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(Object.assign({ team: TEAM }, body))
    });
    if (r.ok) apply(await r.json());
  } catch (e) { /* next poll will resync */ }
  tapsInFlight--;
}

document.querySelectorAll('[data-delta]').forEach(btn =>
  btn.addEventListener('click', () => send({ delta: parseInt(btn.dataset.delta, 10) }))
);

document.getElementById('clear').addEventListener('click', () => {
  if (confirm('Clear the ' + TEAM.toUpperCase() + ' score to 0?')) send({ clear: true });
});

async function refresh() {
  try {
    const s = await fetchState();
    if (tapsInFlight === 0) apply(s); // don't clobber a tap that's mid-flight
  } catch (e) {}
}
refresh();
setInterval(refresh, 1000);
</script>
{% endblock %}
