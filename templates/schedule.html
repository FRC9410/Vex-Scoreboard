{% extends "base.html" %}
{% block title %}Match Schedule{% endblock %}
{% block bodyclass %}schedule{% endblock %}
{% block content %}
  <div id="view-bracket" class="view">
    <header class="sched-top">
      <div class="sched-title">MATCH SCHEDULE</div>
    </header>
    <main id="rot-grid" class="rot-grid"></main>
  </div>

  <div id="view-rank" class="view hidden">
    <header class="sched-top">
      <div class="sched-title">RANKINGS</div>
    </header>
    <main id="rank-list" class="rank-list"></main>
    <div class="rank-legend">WIN = 2 RP &middot; TIE = 1 RP &middot; ties broken by total points scored, then fewest penalty points</div>
  </div>

  <footer id="next-bar" class="next-bar"></footer>
{% endblock %}
{% block script %}
<script>
const BRACKET_MS = 15000;  // how long the full bracket stays up
const RANK_MS = 12000;     // how long the rankings stay up

let sched = null;

function matchRow(m, current) {
  const done = !!m.result;
  const cls = ['match-row'];
  if (m.n - 1 === current) cls.push('current');
  if (done) cls.push('done');
  let mid = 'vs';
  let yCls = 'mr-name yellow', gCls = 'mr-name green';
  if (done) {
    mid = m.result.yellow + ' – ' + m.result.green;
    if (m.result.yellow > m.result.green) yCls += ' winner';
    else if (m.result.green > m.result.yellow) gCls += ' winner';
  }
  return '<div class="' + cls.join(' ') + '">' +
    '<span class="mr-num">' + m.n + '</span>' +
    '<span class="' + yCls + '">' + m.yellow + '</span>' +
    '<span class="mr-mid">' + mid + '</span>' +
    '<span class="' + gCls + '">' + m.green + '</span>' +
    '</div>';
}

function renderBracket() {
  const grid = document.getElementById('rot-grid');
  const rotations = {};
  sched.matches.forEach(m => {
    (rotations[m.rotation] = rotations[m.rotation] || []).push(m);
  });
  grid.innerHTML = Object.keys(rotations).map(r =>
    '<section class="rot-card">' +
    '<div class="rot-title">ROTATION ' + r + '</div>' +
    rotations[r].map(m => matchRow(m, sched.current)).join('') +
    '<div class="bye-row">BYE: ' + sched.byes[r] + '</div>' +
    '</section>'
  ).join('');
}

function renderRankings() {
  const list = document.getElementById('rank-list');
  list.innerHTML =
    '<div class="rank-row head">' +
    '<span class="rk-pos">#</span>' +
    '<span class="rk-team">TEAM</span>' +
    '<span>W-L-T</span>' +
    '<span>RP</span>' +
    '<span>PTS</span>' +
    '<span>FOULS</span>' +
    '</div>' +
    sched.rankings.map((t, i) =>
      '<div class="rank-row' + (i < 3 ? ' top' + (i + 1) : '') + '">' +
      '<span class="rk-pos">' + (i + 1) + '</span>' +
      '<span class="rk-team">' + t.team + '</span>' +
      '<span>' + t.wins + '-' + t.losses + '-' + t.ties + '</span>' +
      '<span class="rk-rp">' + t.rp + '</span>' +
      '<span>' + t.points + '</span>' +
      '<span>' + (t.fouls + t.majors) + '</span>' +
      '</div>'
    ).join('');
}

function renderNextBar() {
  const bar = document.getElementById('next-bar');
  const cur = sched.matches[sched.current];
  const isLast = sched.current === sched.matches.length - 1;
  if (isLast && cur.result) {
    bar.innerHTML = '<span class="nb-label">ALL MATCHES COMPLETE</span>';
    return;
  }
  const next = sched.matches[sched.current + 1];
  bar.innerHTML =
    '<span class="nb-label">UP NEXT</span>' +
    '<span class="nb-match">MATCH ' + cur.n + '</span>' +
    '<span class="nb-teams"><span class="nb-y">' + cur.yellow + '</span>' +
    '<span class="nb-vs">vs</span>' +
    '<span class="nb-g">' + cur.green + '</span></span>' +
    '<span class="nb-bye">BYE: ' + sched.byes[cur.rotation] + '</span>' +
    '<span class="nb-ondeck">' +
    (next ? 'ON DECK: ' + next.yellow + ' vs ' + next.green : 'FINAL MATCH') +
    '</span>';
}

async function refresh() {
  try {
    const r = await fetch('/api/schedule', { cache: 'no-store' });
    if (!r.ok) return;
    sched = await r.json();
    renderBracket();
    renderRankings();
    renderNextBar();
  } catch (e) { /* keep last known schedule */ }
}
refresh();
setInterval(refresh, 3000);

let showingBracket = true;
function flip() {
  showingBracket = !showingBracket;
  document.getElementById('view-bracket').classList.toggle('hidden', !showingBracket);
  document.getElementById('view-rank').classList.toggle('hidden', showingBracket);
  setTimeout(flip, showingBracket ? BRACKET_MS : RANK_MS);
}
setTimeout(flip, BRACKET_MS);
</script>
{% endblock %}
